<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            margin: auto;
            width: 400px;
            background: white;
            height: 600px;
            border: 8px solid darkblue;
            border-radius: 15px;
            display: grid;
            grid-template-rows: 200px 50px 1fr;
            text-align: center;

        }

        #banner {
            background-image: url("images/jesus_feeds_5000.jpeg");
            background-size: cover;
            border-radius: 5px 5px 0 0;
            
        }

        h1, h2 {
            color: white;
            text-shadow: 1px 1px black;
            padding-top: 10px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 20px;
            align-items: center;

        }

        #closeBtn {
            position: absolute;
            top: 15px;
        }

        #username, #password, #email {
            width: 100%;
            height: 20px;
            box-sizing: border-box;
        }

        section {
            margin-right: 10px;
            grid-column: 1 / 3;
            justify-self: center;

        }

        h3 {
            margin-top: 10px;
        }

        #scriptures {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            padding: 5px;
        }

    </style>




</head>

<body>
    <div id="formContainer">
        <div id="banner">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
        <div id="scriptures">
            <img src="images/book_of_mormon.webp" alt="Book of Mormon" width="100%">
            <img src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants" width="100%">
            <img src="images/new_testament.webp" alt="New Testament" width="100%">
            <img src="images/old_testament.webp" alt="Old Testament" width="100%">
            <img src="images/pearl_of_great_price.webp" alt="Pearl of Great Price" width="100%">

        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
